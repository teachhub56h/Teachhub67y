<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { height: 100vh; display: flex; flex-direction: column; background: #e5ddd5; }
        
        /* Fixed Header */
        .header { background: #008069; color: white; padding: 15px; font-weight: bold; }
        
        /* Chat container - Fixed height to avoid overlap */
        #chatBox { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* Input area fixed at bottom */
        .input-area { background: #f0f2f5; padding: 10px; display: flex; align-items: center; gap: 5px; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: none; }
        button { background: #008069; color: white; border: none; padding: 10px 15px; border-radius: 20px; }
        
        .msg { max-width: 80%; padding: 10px; border-radius: 8px; }
        .received { background: #ffffff; align-self: flex-start; }
        .sent { background: #d9fdd3; align-self: flex-end; }
    </style>
</head>
<body>

<div class="header">Customer Support</div>
<div id="chatBox"></div>
<div class="input-area">
    <input type="text" id="msgInput" placeholder="Type a message...">
    <button onclick="sendMsg()">➤</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDbjIDUk4bnJuVfSQZua61dyiDsjjC6uiU",
        authDomain: "newpro-affc8.firebaseapp.com",
        projectId: "newpro-affc8",
        storageBucket: "newpro-affc8.firebasestorage.app",
        messagingSenderId: "1080341611919",
        appId: "1:1080341611919:web:373d7fa13901e4b41c77fa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // UNIQUE ID: Yahan wo ID dalain jo Admin panel mein show ho rahi hai
    // Ya phir device ID use karain taake chat save rahay
    const activeDocId = "user_device_001"; 

    onSnapshot(query(collection(db, "group_messages", activeDocId, "messages"), orderBy("time_now", "asc")), (snap) => {
        const box = document.getElementById('chatBox');
        box.innerHTML = "";
        snap.forEach(d => {
            const msg = d.data();
            const div = document.createElement('div');
            div.className = `msg ${msg.sender === 'admin' ? 'received' : 'sent'}`;
            div.innerText = msg.message_text || "File sent";
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });

    window.sendMsg = async () => {
        const text = document.getElementById('msgInput').value;
        if(!text) return;
        await addDoc(collection(db, "group_messages", activeDocId, "messages"), {
            sender: 'user', type: 'text', message_text: text, time_now: Date.now()
        });
        await updateDoc(doc(db, "group_messages", activeDocId), { lastUpdated: Date.now() });
        document.getElementById('msgInput').value = "";
    };
</script>
</body>
</html>
