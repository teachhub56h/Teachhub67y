<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Customer Support</title>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        html, body { height: 100%; overflow: hidden; }
        
        body { 
            background: #efeae2; 
            display: flex; justify-content: center; align-items: center; 
        }

        .chat-container { 
            width: 100%; height: 100%; background: #efeae2; 
            display: flex; flex-direction: column; 
            position: relative;
        }
        
        /* Header Fix */
        .chat-header { 
            background: #008069; color: white; padding: 10px 15px; 
            display: flex; align-items: center; gap: 12px; flex-shrink: 0;
        }
        .profile-img { width: 40px; height: 40px; border-radius: 50%; background: #ccc; }
        
        /* Chat Messages Area - Yeh scrolling handle karega */
        .chat-messages { 
            flex: 1; overflow-y: auto; padding: 15px; 
            display: flex; flex-direction: column; gap: 8px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
        }

        /* Input Area - Yeh bottom par fix rahega */
        .chat-input-area { 
            padding: 8px; background: #f0f2f5; flex-shrink: 0;
            display: flex; align-items: center; gap: 8px;
            padding-bottom: constant(safe-area-inset-bottom); /* iPhone notch support */
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        .input-container { 
            flex: 1; background: #fff; border-radius: 24px; display: flex; align-items: center; padding: 5px 10px;
        }
        .input-container input { flex: 1; border: none; outline: none; padding: 10px; font-size: 16px; }
        
        .send-btn { 
            background: #005c4b; color: white; border: none; width: 45px; height: 45px; 
            border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* Messages */
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 8px; font-size: 15px; }
        .sent-by-me { background: #d9fdd3; align-self: flex-end; }
        .received-by-me { background: #ffffff; align-self: flex-start; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <img class="profile-img" src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
        <div class="header-info">
            <div class="name">Customer Support</div>
            <div class="status">Online</div>
        </div>
    </div>
    
    <div class="chat-messages" id="chatBox">
        <!-- Messages yahan aayenge -->
    </div>
    
    <div class="chat-input-area">
        <div class="input-container">
            <input type="text" id="msgInput" placeholder="Type a message...">
        </div>
        <button class="send-btn" id="sendBtn">➤</button>
    </div>
</div>

<script>
    // Message scroll automatically to bottom
    function scrollToBottom() {
        const chatBox = document.getElementById('chatBox');
        chatBox.scrollTop = chatBox.scrollHeight;
    }
    // Jab bhi naya message aaye, ye function call karein
</script>
</body>
</html>
