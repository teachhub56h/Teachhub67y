<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Admin Panel</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #dadbd3; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 450px; height: 100vh; background: #efeae2; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Inbox Styles */
        .user-item { padding: 15px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; background: white; cursor: pointer; align-items: center; }
        .new-badge { background: #25d366; color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px; display: none; }

        /* Chat Styles */
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px; border-radius: 8px; }
        .sent { background: #d9fdd3; align-self: flex-end; }
        .received { background: #ffffff; align-self: flex-start; }
        img, video, audio { max-width: 200px; display: block; }

        /* Input Area */
        .chat-input-area { padding: 10px; background: #f0f2f5; display: flex; gap: 5px; align-items: center; }
        input[type="text"] { flex: 1; padding: 10px; border-radius: 20px; border: none; }
        button { border: none; background: #008069; color: white; padding: 10px 15px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="chat-container">
    <div id="inbox-view">
        <div style="background:#008069; color:white; padding:15px; font-weight:bold;">Conversations</div>
        <div id="userList"></div>
    </div>

    <div id="chat-view" style="display:none; flex-direction:column; height:100%;">
        <div style="background:#004d40; color:white; padding:15px;"><button onclick="location.reload()">Back</button></div>
        <div id="chatBox" class="chat-messages"></div>
        <div class="chat-input-area">
            <input type="file" id="fileInput" hidden>
            <button onclick="document.getElementById('fileInput').click()">📎</button>
            <input type="text" id="msgInput" placeholder="Type a message...">
            <button onclick="sendText()">Send</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDbjIDUk4bnJuVfSQZua61dyiDsjjC6uiU",
        authDomain: "newpro-affc8.firebaseapp.com",
        projectId: "newpro-affc8",
        storageBucket: "newpro-affc8.firebasestorage.app",
        messagingSenderId: "1080341611919",
        appId: "1:1080341611919:web:373d7fa13901e4b41c77fa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let activeDocId = "";

    // Load Inbox Sorted by lastUpdated
    onSnapshot(query(collection(db, "group_messages"), orderBy("lastUpdated", "desc")), (snap) => {
        const list = document.getElementById('userList');
        list.innerHTML = "";
        snap.forEach(d => {
            const div = document.createElement('div');
            div.className = "user-item";
            div.innerHTML = `<div>User ${d.id.substring(0,6)}</div> <div class="new-badge" id="badge-${d.id}">New</div>`;
            div.onclick = () => openChat(d.id);
            list.appendChild(div);
        });
    });

    window.openChat = (id) => {
        activeDocId = id;
        document.getElementById('inbox-view').style.display = 'none';
        document.getElementById('chat-view').style.display = 'flex';
        onSnapshot(query(collection(db, "group_messages", id, "messages"), orderBy("time_now", "asc")), (snap) => {
            const box = document.getElementById('chatBox');
            box.innerHTML = "";
            snap.forEach(d => {
                const msg = d.data();
                const div = document.createElement('div');
                div.className = `msg ${msg.sender === 'admin' ? 'sent' : 'received'}`;
                if(msg.type === 'text') div.innerText = msg.message_text;
                else if(msg.type === 'image') div.innerHTML = `<img src="${msg.file_url}">`;
                else if(msg.type === 'video') div.innerHTML = `<video src="${msg.file_url}" controls></video>`;
                else if(msg.type === 'audio') div.innerHTML = `<audio src="${msg.file_url}" controls></audio>`;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    };

    window.sendText = async () => {
        const text = document.getElementById('msgInput').value;
        if(!text) return;
        await addDoc(collection(db, "group_messages", activeDocId, "messages"), {
            sender: 'admin', type: 'text', message_text: text, time_now: Date.now()
        });
        await updateDoc(doc(db, "group_messages", activeDocId), { lastUpdated: Date.now() });
        document.getElementById('msgInput').value = "";
    };

    // File Upload Handler
    document.getElementById('fileInput').onchange = async (e) => {
        const file = e.target.files[0];
        const storageRef = ref(storage, 'uploads/' + Date.now() + file.name);
        await uploadBytes(storageRef, file);
        const url = await getDownloadURL(storageRef);
        let type = 'image';
        if(file.type.includes('video')) type = 'video';
        if(file.type.includes('audio')) type = 'audio';
        
        await addDoc(collection(db, "group_messages", activeDocId, "messages"), {
            sender: 'admin', type: type, file_url: url, time_now: Date.now()
        });
        await updateDoc(doc(db, "group_messages", activeDocId), { lastUpdated: Date.now() });
    };
</script>

</body>
</html>
